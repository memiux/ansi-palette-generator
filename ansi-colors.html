<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
	<meta charset="UTF-8">
	<title>ANSI Colors — OKLCH Pastels</title>
	<style>
		:root { --bg: #1a1a1a; --fg: #cccccc; --label: #888; --border: #333; }
		[data-mode="light"] { --bg: #f5f5f5; --fg: #222222; --label: #666; --border: #ccc; }
		body { font-family: monospace; background: var(--bg); color: var(--fg); padding: 2rem; transition: background .2s, color .2s; }
		.toolbar { display: flex; justify-content: flex-end; align-items: center; gap: .5rem; margin-bottom: 1rem; }
		.grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: .5rem; }
		.swatch {
			position: relative; padding: 1rem .5rem .4rem;
			text-align: center; font-size: .75rem; border-radius: 4px; cursor: default;
			display: flex; flex-direction: column; align-items: center; justify-content: space-between; gap: .3rem;
		}
		.badge { font-size: .6rem; opacity: .75; line-height: 1; display: flex; align-items: center; gap: .2rem; }
		.dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
		.dot.aaa  { background: #2ecc71; }
		.dot.aa   { background: #f1c40f; }
		.dot.a    { background: #e67e22; }
		.dot.fail { background: #e74c3c; }
		h2 { margin: 0 0 .5rem; font-size: .85rem; color: var(--label); }
		.swatches-card { border: 1px solid var(--border); border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
		.controls-wrap { display: flex; gap: 1rem; flex-wrap: wrap; }
		.controls { display: flex; flex-direction: column; gap: .75rem; padding: 1rem; border: 1px solid var(--border); border-radius: 6px; }
		.controls header { display: flex; align-items: center; margin-bottom: .25rem; }
		.controls header span { font-size: .85rem; color: var(--label); }
		.group-block { display: flex; flex-direction: column; gap: .35rem; }
		.group-label { font-size: .7rem; color: var(--label); text-transform: uppercase; letter-spacing: .05em; }
		.slider-row { display: grid; grid-template-columns: 4.5rem 1fr 3rem; align-items: center; gap: .5rem; font-size: .75rem; color: var(--label); }
		.slider-row input[type=range] { width: 100%; accent-color: var(--fg); }
		.slider-row output { text-align: right; color: var(--label); transition: color .15s; }
		.slider-row output.changed { color: var(--fg); font-weight: bold; }
		hr.divider { border: none; border-top: 1px solid var(--border); margin: .25rem 0; }
		button, select {
			padding: .4rem .75rem; font-family: monospace; font-size: .85rem;
			background: transparent; color: var(--fg); border: 1px solid var(--label);
			border-radius: 4px; cursor: pointer;
		}
		button:hover, select:hover { border-color: var(--fg); }
		select option { background: var(--bg); color: var(--fg); }
		.palette-card { display: flex; flex-direction: column; }
		.palette-card pre { margin: 0; min-width: 12rem; max-height: 22rem; line-height: 1.6; color: var(--label); overflow-y: auto; flex: 1; }
		.palette-card header { justify-content: space-between; }
		.palette-card header button { font-size: .75rem; padding: .2rem .5rem; }
		@media (max-width: 700px) {
			body { padding: 1rem; }
			.controls-wrap { flex-direction: column; }
			.controls { width: 100%; box-sizing: border-box; }
			.palette-card pre { max-height: 16rem; }
			.grid { grid-template-columns: repeat(4, 1fr); }
		}
		@media (max-width: 420px) {
			.grid { grid-template-columns: repeat(2, 1fr); }
		}
		.toolbar-sep { width: 1px; background: var(--border); align-self: stretch; margin: 0 .1rem; }
		label[for="import-file"], label#btn-import-label {
			padding: .4rem .75rem; font-family: monospace; font-size: .85rem;
			background: transparent; color: var(--fg); border: 1px solid var(--label);
			border-radius: 4px; cursor: pointer;
		}
		label#btn-import-label:hover { border-color: var(--fg); }
		#import-error { font-size: .75rem; color: #e74c3c; display: none; }
		#import-error.visible { display: inline; }
	</style>
</head>
<body>

	<div class="toolbar">
		<select id="preset-select">
			<optgroup label="Built-in">
				<option value="default">Default</option>
				<option value="warm">Warm</option>
				<option value="cool">Cool</option>
				<option value="nord">Nord-ish</option>
				<option value="muted">Muted</option>
				<option value="vivid">Vivid</option>
				<option value="kizuna">Kizuna AI</option>
			</optgroup>
			<optgroup id="custom-optgroup" label="Custom" style="display:none"></optgroup>
		</select>
		<button id="btn-save-preset" title="Save current state as a custom preset">★ Save</button>
		<button id="btn-delete-preset" title="Delete selected custom preset" style="display:none">✕ Delete</button>
		<span class="toolbar-sep"></span>
		<button id="btn-export" title="Export current state as JSON">↓ Export</button>
		<label id="btn-import-label" title="Import a preset JSON file">↑ Import<input type="file" id="import-file" accept=".json" style="display:none"></label>
		<span class="toolbar-sep"></span>
		<button id="btn-reset">🗘 Reset</button>
		<button id="btn-toggle">☀ Light</button>
		<span id="import-error"></span>
	</div>

	<div class="swatches-card">
		<h2>Dim</h2>
		<div class="grid" data-group="Dim">
			<div class="swatch" data-color="Black" data-neutral="1">Black<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Red">Red<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Yellow">Yellow<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Green">Green<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Cyan">Cyan<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Blue">Blue<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Magenta">Magenta<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="White" data-neutral="1">White<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
		</div>

		<h2 style="margin-top:1.5rem">Normal</h2>
		<div class="grid" data-group="Normal">
			<div class="swatch" data-color="Black" data-neutral="1">Black<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Red">Red<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Yellow">Yellow<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Green">Green<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Cyan">Cyan<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Blue">Blue<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Magenta">Magenta<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="White" data-neutral="1">White<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
		</div>

		<h2 style="margin-top:1.5rem">Bright</h2>
		<div class="grid" data-group="Bright">
			<div class="swatch" data-color="Black" data-neutral="1">Black<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Red">Red<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Yellow">Yellow<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Green">Green<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Cyan">Cyan<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Blue">Blue<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="Magenta">Magenta<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
			<div class="swatch" data-color="White" data-neutral="1">White<span class="badge"><span class="dot"></span><span class="ratio"></span></span></div>
		</div>
	</div>

	<div class="controls-wrap">

		<div class="controls">
			<header><span>Hue (H)</span></header>
			<div class="slider-row">
				<label>Black</label>
				<input type="range" data-hue="Black" min="0" max="360" step="1" value="60">
				<output>60</output>
			</div>
			<div class="slider-row">
				<label>Red</label>
				<input type="range" data-hue="Red" min="10" max="60" step="1" value="29">
				<output>29</output>
			</div>
			<div class="slider-row">
				<label>Yellow</label>
				<input type="range" data-hue="Yellow" min="75" max="130" step="1" value="109">
				<output>109</output>
			</div>
			<div class="slider-row">
				<label>Green</label>
				<input type="range" data-hue="Green" min="120" max="175" step="1" value="142">
				<output>142</output>
			</div>
			<div class="slider-row">
				<label>Cyan</label>
				<input type="range" data-hue="Cyan" min="175" max="220" step="1" value="194">
				<output>194</output>
			</div>
			<div class="slider-row">
				<label>Blue</label>
				<input type="range" data-hue="Blue" min="220" max="295" step="1" value="264">
				<output>264</output>
			</div>
			<div class="slider-row">
				<label>Magenta</label>
				<input type="range" data-hue="Magenta" min="295" max="360" step="1" value="328">
				<output>328</output>
			</div>
			<div class="slider-row">
				<label>White</label>
				<input type="range" data-hue="White" min="0" max="360" step="1" value="260">
				<output>260</output>
			</div>
			<hr class="divider">
			<div class="slider-row">
				<label>Black L</label>
				<input type="range" id="nblack-slider" min="0.10" max="0.80" step="0.01" value="0.42">
				<output id="nblack-output">0.42</output>
			</div>
			<div class="slider-row">
				<label>White L</label>
				<input type="range" id="nwhite-slider" min="0.50" max="1.50" step="0.01" value="1.05">
				<output id="nwhite-output">1.05</output>
			</div>
			<div class="slider-row">
				<label>Neutral S</label>
				<input type="range" id="nsat-slider" min="0" max="1" step="0.01" value="1">
				<output id="nsat-output">1.00</output>
			</div>
			<div class="slider-row">
				<label>Temp</label>
				<input type="range" id="temp-slider" min="-20" max="20" step="1" value="0">
				<output id="temp-output">0</output>
			</div>
		</div>

		<div class="controls">
			<header><span>oklch( L  C  H )</span></header>
			<div class="group-block">
				<span class="group-label">Dim</span>
				<div class="slider-row">
					<label>L</label>
					<input type="range" data-group="Dim" data-param="l" min="0.10" max="0.95" step="0.01" value="0.55">
					<output>0.55</output>
				</div>
				<div class="slider-row">
					<label>C</label>
					<input type="range" data-group="Dim" data-param="c" min="0.00" max="0.30" step="0.01" value="0.07">
					<output>0.07</output>
				</div>
			</div>
			<hr class="divider">
			<div class="group-block">
				<span class="group-label">Normal</span>
				<div class="slider-row">
					<label>L</label>
					<input type="range" data-group="Normal" data-param="l" min="0.10" max="0.95" step="0.01" value="0.72">
					<output>0.72</output>
				</div>
				<div class="slider-row">
					<label>C</label>
					<input type="range" data-group="Normal" data-param="c" min="0.00" max="0.30" step="0.01" value="0.10">
					<output>0.10</output>
				</div>
			</div>
			<hr class="divider">
			<div class="group-block">
				<span class="group-label">Bright</span>
				<div class="slider-row">
					<label>L</label>
					<input type="range" data-group="Bright" data-param="l" min="0.10" max="0.95" step="0.01" value="0.82">
					<output>0.82</output>
				</div>
				<div class="slider-row">
					<label>C</label>
					<input type="range" data-group="Bright" data-param="c" min="0.00" max="0.30" step="0.01" value="0.13">
					<output>0.13</output>
				</div>
			</div>
		</div>

		<div class="controls palette-card">
			<header><span>Palette</span><button id="btn-copy-palette" title="Copy as Zed theme keys">Copy</button></header>
			<pre id="palette"></pre>
		</div>

	</div>

	<script>
		const RAINBOW = ['Black', 'Red', 'Yellow', 'Green', 'Cyan', 'Blue', 'Magenta', 'White'];

		const DEFAULTS = {
			hues:   { Black: 60, Red: 29, Yellow: 109, Green: 142, Cyan: 194, Blue: 264, Magenta: 328, White: 260 },
			temp:   0,
			neutralSat: 1,
			neutralBlack: 0.42,
			neutralWhite: 1.05,
			params: {
				dark:  { Dim: { l: 0.55, c: 0.07 }, Normal: { l: 0.72, c: 0.10 }, Bright: { l: 0.82, c: 0.13 } },
				light: { Dim: { l: 0.42, c: 0.07 }, Normal: { l: 0.52, c: 0.10 }, Bright: { l: 0.60, c: 0.13 } },
			},
		};

		const PRESETS = {
			default: {
				hues:   { Black: 60, Red: 29, Yellow: 109, Green: 142, Cyan: 194, Blue: 264, Magenta: 328, White: 260 },
				temp: 0, neutralSat: 1, neutralBlack: 0.42, neutralWhite: 1.05,
				params: {
					dark:  { Dim: { l: 0.55, c: 0.07 }, Normal: { l: 0.72, c: 0.10 }, Bright: { l: 0.82, c: 0.13 } },
					light: { Dim: { l: 0.42, c: 0.07 }, Normal: { l: 0.52, c: 0.10 }, Bright: { l: 0.60, c: 0.13 } },
				},
			},
			warm: {
				hues:   { Black: 55, Red: 22, Yellow: 95, Green: 140, Cyan: 188, Blue: 258, Magenta: 320, White: 88 },
				temp: -8, neutralSat: 1, neutralBlack: 0.42, neutralWhite: 1.05,
				params: {
					dark:  { Dim: { l: 0.53, c: 0.08 }, Normal: { l: 0.70, c: 0.11 }, Bright: { l: 0.80, c: 0.14 } },
					light: { Dim: { l: 0.40, c: 0.08 }, Normal: { l: 0.50, c: 0.11 }, Bright: { l: 0.58, c: 0.14 } },
				},
			},
			cool: {
				hues:   { Black: 215, Red: 35, Yellow: 115, Green: 148, Cyan: 200, Blue: 270, Magenta: 335, White: 245 },
				temp: 8, neutralSat: 1, neutralBlack: 0.42, neutralWhite: 1.05,
				params: {
					dark:  { Dim: { l: 0.56, c: 0.07 }, Normal: { l: 0.73, c: 0.10 }, Bright: { l: 0.83, c: 0.12 } },
					light: { Dim: { l: 0.43, c: 0.07 }, Normal: { l: 0.53, c: 0.10 }, Bright: { l: 0.61, c: 0.12 } },
				},
			},
			nord: {
				hues:   { Black: 210, Red: 15, Yellow: 92, Green: 143, Cyan: 196, Blue: 248, Magenta: 316, White: 228 },
				temp: 3, neutralSat: 1, neutralBlack: 0.42, neutralWhite: 1.05,
				params: {
					dark:  { Dim: { l: 0.50, c: 0.06 }, Normal: { l: 0.68, c: 0.08 }, Bright: { l: 0.78, c: 0.10 } },
					light: { Dim: { l: 0.38, c: 0.06 }, Normal: { l: 0.48, c: 0.08 }, Bright: { l: 0.56, c: 0.10 } },
				},
			},
			muted: {
				hues:   { Black: 65, Red: 29, Yellow: 109, Green: 142, Cyan: 194, Blue: 264, Magenta: 328, White: 250 },
				temp: 0, neutralSat: 1, neutralBlack: 0.42, neutralWhite: 1.05,
				params: {
					dark:  { Dim: { l: 0.55, c: 0.04 }, Normal: { l: 0.72, c: 0.06 }, Bright: { l: 0.82, c: 0.08 } },
					light: { Dim: { l: 0.42, c: 0.04 }, Normal: { l: 0.52, c: 0.06 }, Bright: { l: 0.60, c: 0.08 } },
				},
			},
			vivid: {
				hues:   { Black: 40, Red: 29, Yellow: 109, Green: 142, Cyan: 194, Blue: 264, Magenta: 328, White: 285 },
				temp: 0, neutralSat: 1, neutralBlack: 0.42, neutralWhite: 1.05,
				params: {
					dark:  { Dim: { l: 0.52, c: 0.12 }, Normal: { l: 0.70, c: 0.16 }, Bright: { l: 0.80, c: 0.20 } },
					light: { Dim: { l: 0.40, c: 0.12 }, Normal: { l: 0.50, c: 0.16 }, Bright: { l: 0.58, c: 0.20 } },
				},
			},
			kizuna: {
				hues:   { Black: 322, Red: 18, Yellow: 98, Green: 140, Cyan: 198, Blue: 266, Magenta: 322, White: 282 },
				temp: -4, neutralSat: 0.85, neutralBlack: 0.42, neutralWhite: 1.05,
				params: {
					dark:  { Dim: { l: 0.54, c: 0.11 }, Normal: { l: 0.71, c: 0.14 }, Bright: { l: 0.82, c: 0.17 } },
					light: { Dim: { l: 0.41, c: 0.11 }, Normal: { l: 0.51, c: 0.14 }, Bright: { l: 0.59, c: 0.17 } },
				},
			},
		};

		function currentMode() { return document.documentElement.dataset.mode; }

		const hues   = { ...DEFAULTS.hues };
		const params = {
			Dim:    { ...DEFAULTS.params.dark.Dim },
			Normal: { ...DEFAULTS.params.dark.Normal },
			Bright: { ...DEFAULTS.params.dark.Bright },
		};
		const paramsStore = {
			dark:  { Dim: {...DEFAULTS.params.dark.Dim},  Normal: {...DEFAULTS.params.dark.Normal},  Bright: {...DEFAULTS.params.dark.Bright}  },
			light: { Dim: {...DEFAULTS.params.light.Dim}, Normal: {...DEFAULTS.params.light.Normal}, Bright: {...DEFAULTS.params.light.Bright} },
		};
		let temperature = 0;
		let neutralSat  = 1;

		const neutralFactor = { Black: 0.42, White: 1.05 };

		const canvas = document.createElement('canvas');
		canvas.width = canvas.height = 1;
		const ctx = canvas.getContext('2d');

		function toRGB(cssColor) {
			ctx.clearRect(0, 0, 1, 1);
			ctx.fillStyle = cssColor;
			ctx.fillRect(0, 0, 1, 1);
			const d = ctx.getImageData(0, 0, 1, 1).data;
			return [d[0], d[1], d[2]];
		}

		function toHex([r, g, b]) {
			return '#' + [r, g, b].map(n => n.toString(16).padStart(2, '0').toUpperCase()).join('');
		}

		function linearize(c) {
			c /= 255;
			return c <= 0.04045 ? c / 12.92 : ((c + 0.055) / 1.055) ** 2.4;
		}

		function luminance(r, g, b) {
			return 0.2126 * linearize(r) + 0.7152 * linearize(g) + 0.0722 * linearize(b);
		}

		function contrastRatio(lum1, lum2) {
			const light = Math.max(lum1, lum2);
			const dark  = Math.min(lum1, lum2);
			return (light + 0.05) / (dark + 0.05);
		}

		function wcagLevel(ratio) {
			if (ratio >= 7)   return 'aaa';
			if (ratio >= 4.5) return 'aa';
			if (ratio >= 3)   return 'a';
			return 'fail';
		}

		function applySwatches() {
			const isDark = document.documentElement.dataset.mode === 'dark';

			document.querySelectorAll('.grid[data-group]').forEach(grid => {
				const group    = grid.dataset.group;
				const { l, c } = params[group];
				const neutralC = (c * 0.3 + Math.abs(temperature) * 0.003) * neutralSat;

				grid.querySelectorAll('.swatch').forEach(el => {
					const name     = el.dataset.color;
					const neutral  = el.dataset.neutral;
					const neutralL = Math.min(0.98, Math.max(0.05, l * (neutralFactor[name] ?? 1)));
					const bgCss = neutral
						? `oklch(${neutralL.toFixed(2)} ${neutralC.toFixed(4)} ${hues[name] + temperature})`
						: `oklch(${l} ${c} ${hues[name] + temperature})`;

					el.style.background = bgCss;

					const textColor = isDark
						? (name === 'Black' ? '#ccc' : '#333')
						: (name === 'White' ? '#333' : '#fff');
					el.style.color = textColor;

					const bgRGB  = toRGB(bgCss);
					const txtRGB = toRGB(textColor);
					const ratio  = contrastRatio(luminance(...bgRGB), luminance(...txtRGB));
					const level  = wcagLevel(ratio);
					el.querySelector('.dot').className    = `dot ${level}`;
					el.querySelector('.ratio').textContent = ratio.toFixed(1);
					el.title = toHex(bgRGB);
				});
			});

			renderPalette();
		}

		function renderPalette() {
			const mode  = document.documentElement.dataset.mode;
			const lines = [mode.charAt(0).toUpperCase() + mode.slice(1), ''];
			document.querySelectorAll('.grid[data-group]').forEach(grid => {
				const group = grid.dataset.group;
				const map   = Object.fromEntries(
					[...grid.querySelectorAll('.swatch')].map(el => [el.dataset.color, el])
				);
				lines.push(group);
				RAINBOW.forEach(name => lines.push(`  ${name.padEnd(8)}${map[name].title}`));
				lines.push('');
			});
			document.getElementById('palette').textContent = lines.join('\n').trimEnd();
		}

		function buildZedPalette() {
			const PREFIX = { Dim: 'dim_', Normal: '', Bright: 'bright_' };
			const lines = [];
			document.querySelectorAll('.grid[data-group]').forEach(grid => {
				const group = grid.dataset.group;
				const map = Object.fromEntries(
					[...grid.querySelectorAll('.swatch')].map(el => [el.dataset.color, el])
				);
				RAINBOW.forEach(name => {
					const key = `terminal.ansi.${PREFIX[group]}${name.toLowerCase()}`;
					lines.push(`"${key}": "${map[name].title}",`);
				});
			});
			return lines.join('\n');
		}

		document.getElementById('btn-copy-palette').addEventListener('click', function() {
			navigator.clipboard.writeText(buildZedPalette()).then(() => {
				this.textContent = 'Copied!';
				setTimeout(() => this.textContent = 'Copy', 1500);
			});
		});

		function markOutput(outputEl, currentStr, defaultStr) {
			outputEl.classList.toggle('changed', currentStr !== defaultStr);
		}

		function syncSlidersToState(preset) {
			document.querySelectorAll('input[data-hue]').forEach(slider => {
				const color  = slider.dataset.hue;
				const value  = preset.hues[color];
				const output = slider.nextElementSibling;
				slider.value = value;
				output.value = String(value);
				markOutput(output, String(value), String(DEFAULTS.hues[color]));
			});

			const nblackSlider = document.getElementById('nblack-slider');
			const nblackOutput = document.getElementById('nblack-output');
			nblackSlider.value = preset.neutralBlack;
			nblackOutput.value = preset.neutralBlack.toFixed(2);
			markOutput(nblackOutput, preset.neutralBlack.toFixed(2), DEFAULTS.neutralBlack.toFixed(2));

			const nwhiteSlider = document.getElementById('nwhite-slider');
			const nwhiteOutput = document.getElementById('nwhite-output');
			nwhiteSlider.value = preset.neutralWhite;
			nwhiteOutput.value = preset.neutralWhite.toFixed(2);
			markOutput(nwhiteOutput, preset.neutralWhite.toFixed(2), DEFAULTS.neutralWhite.toFixed(2));

			const nsatSlider = document.getElementById('nsat-slider');
			const nsatOutput = document.getElementById('nsat-output');
			nsatSlider.value = preset.neutralSat;
			nsatOutput.value = preset.neutralSat.toFixed(2);
			markOutput(nsatOutput, preset.neutralSat.toFixed(2), DEFAULTS.neutralSat.toFixed(2));

			const tempSlider = document.getElementById('temp-slider');
			const tempOutput = document.getElementById('temp-output');
			tempSlider.value = preset.temp;
			tempOutput.value = preset.temp > 0 ? `+${preset.temp}` : String(preset.temp);
			markOutput(tempOutput, String(preset.temp), String(DEFAULTS.temp));

			document.querySelectorAll('input[data-group]').forEach(slider => {
				const mode   = currentMode();
				const g      = slider.dataset.group;
				const p      = slider.dataset.param;
				const value  = preset.params[mode][g][p];
				const output = slider.nextElementSibling;
				slider.value = value;
				output.value = value.toFixed(2);
				markOutput(output, value.toFixed(2), DEFAULTS.params[mode][g][p].toFixed(2));
			});
		}

		function applyPreset(preset) {
			const mode = currentMode();
			Object.assign(hues, preset.hues);
			['Dim', 'Normal', 'Bright'].forEach(g => {
				Object.assign(params[g],            preset.params[mode][g]);
				Object.assign(paramsStore.dark[g],  preset.params.dark[g]);
				Object.assign(paramsStore.light[g], preset.params.light[g]);
			});
			temperature = preset.temp;
			neutralSat  = preset.neutralSat;
			neutralFactor.Black = preset.neutralBlack;
			neutralFactor.White = preset.neutralWhite;
			syncSlidersToState(preset);
			applySwatches();
		}

		document.getElementById('nblack-slider').addEventListener('input', function() {
			neutralFactor.Black = parseFloat(this.value);
			const output = document.getElementById('nblack-output');
			output.value = neutralFactor.Black.toFixed(2);
			markOutput(output, neutralFactor.Black.toFixed(2), DEFAULTS.neutralBlack.toFixed(2));
			document.getElementById('preset-select').value = '';
			applySwatches();
		});

		document.getElementById('nwhite-slider').addEventListener('input', function() {
			neutralFactor.White = parseFloat(this.value);
			const output = document.getElementById('nwhite-output');
			output.value = neutralFactor.White.toFixed(2);
			markOutput(output, neutralFactor.White.toFixed(2), DEFAULTS.neutralWhite.toFixed(2));
			document.getElementById('preset-select').value = '';
			applySwatches();
		});

		document.getElementById('nsat-slider').addEventListener('input', function() {
			neutralSat = parseFloat(this.value);
			const output = document.getElementById('nsat-output');
			output.value = neutralSat.toFixed(2);
			markOutput(output, neutralSat.toFixed(2), DEFAULTS.neutralSat.toFixed(2));
			document.getElementById('preset-select').value = '';
			applySwatches();
		});

		document.getElementById('temp-slider').addEventListener('input', function() {
			temperature = parseInt(this.value, 10);
			const output = document.getElementById('temp-output');
			output.value = temperature > 0 ? `+${temperature}` : String(temperature);
			markOutput(output, String(temperature), String(DEFAULTS.temp));
			document.getElementById('preset-select').value = '';
			applySwatches();
		});

		document.querySelectorAll('input[data-hue]').forEach(slider => {
			slider.addEventListener('input', () => {
				const value  = parseInt(slider.value, 10);
				const output = slider.nextElementSibling;
				hues[slider.dataset.hue] = value;
				output.value = String(value);
				markOutput(output, String(value), String(DEFAULTS.hues[slider.dataset.hue]));
				document.getElementById('preset-select').value = '';
				applySwatches();
			});
		});

		document.querySelectorAll('input[data-group]').forEach(slider => {
			slider.addEventListener('input', () => {
				const value  = parseFloat(slider.value);
				const output = slider.nextElementSibling;
				params[slider.dataset.group][slider.dataset.param] = value;
				paramsStore[currentMode()][slider.dataset.group][slider.dataset.param] = value;
				output.value = value.toFixed(2);
				markOutput(output, value.toFixed(2), DEFAULTS.params[currentMode()][slider.dataset.group][slider.dataset.param].toFixed(2));
				document.getElementById('preset-select').value = '';
				applySwatches();
			});
		});

		// ── Preset persistence helpers ──────────────────────────────────────────

		function captureCurrentState() {
			const mode = currentMode();
			['Dim', 'Normal', 'Bright'].forEach(g => Object.assign(paramsStore[mode][g], params[g]));
			return {
				hues:      { ...hues },
				temp:      temperature,
				neutralSat,
				neutralBlack: neutralFactor.Black,
				neutralWhite: neutralFactor.White,
				params: {
					dark:  { Dim: {...paramsStore.dark.Dim},  Normal: {...paramsStore.dark.Normal},  Bright: {...paramsStore.dark.Bright}  },
					light: { Dim: {...paramsStore.light.Dim}, Normal: {...paramsStore.light.Normal}, Bright: {...paramsStore.light.Bright} },
				},
			};
		}

		function loadCustomPresets() {
			try { return JSON.parse(localStorage.getItem('ansi-custom-presets') || '{}'); }
			catch { return {}; }
		}

		function saveCustomPreset(name, preset) {
			const all = loadCustomPresets();
			let candidate = name, n = 2;
			while (all[candidate]) { candidate = `${name} (${n++})`; }
			all[candidate] = preset;
			try { localStorage.setItem('ansi-custom-presets', JSON.stringify(all)); }
			catch { showImportError('Storage full'); return null; }
			return candidate;
		}

		function deleteCustomPreset(name) {
			const all = loadCustomPresets();
			delete all[name];
			localStorage.setItem('ansi-custom-presets', JSON.stringify(all));
		}

		function rebuildCustomOptgroup() {
			const group = document.getElementById('custom-optgroup');
			group.innerHTML = '';
			const all = loadCustomPresets();
			const names = Object.keys(all);
			group.style.display = names.length ? '' : 'none';
			names.forEach(name => {
				const opt = document.createElement('option');
				opt.value = 'custom:' + name;
				opt.textContent = '★ ' + name;
				group.appendChild(opt);
			});
		}

		function updateDeleteButton() {
			const sel = document.getElementById('preset-select');
			document.getElementById('btn-delete-preset').style.display =
				sel.value.startsWith('custom:') ? '' : 'none';
		}

		function getActivePreset() {
			const val = document.getElementById('preset-select').value;
			if (!val) return null;
			if (val.startsWith('custom:')) return loadCustomPresets()[val.slice(7)] || null;
			return PRESETS[val] || null;
		}

		function validatePreset(obj) {
			if (!obj || typeof obj !== 'object') return 'Not an object';
			const hueKeys = ['Black','Red','Yellow','Green','Cyan','Blue','Magenta','White'];
			if (!obj.hues || hueKeys.some(k => typeof obj.hues[k] !== 'number')) return 'Missing or invalid hues';
			if (typeof obj.temp !== 'number') return 'Missing temp';
			if (typeof obj.neutralSat !== 'number') return 'Missing neutralSat';
			if (typeof obj.neutralBlack !== 'number') obj.neutralBlack = 0.42;
			if (typeof obj.neutralWhite !== 'number') obj.neutralWhite = 1.05;
			if (!obj.params) return 'Missing params';
			for (const mode of ['dark','light']) {
				if (!obj.params[mode]) return `Missing params.${mode}`;
				for (const g of ['Dim','Normal','Bright']) {
					const gp = obj.params[mode][g];
					if (!gp || typeof gp.l !== 'number' || typeof gp.c !== 'number') return `Invalid params.${mode}.${g}`;
				}
			}
			return null;
		}

		function showImportError(msg) {
			const el = document.getElementById('import-error');
			el.textContent = msg;
			el.classList.add('visible');
			clearTimeout(showImportError._t);
			showImportError._t = setTimeout(() => el.classList.remove('visible'), 4000);
		}

		function exportCurrentState() {
			const sel  = document.getElementById('preset-select');
			const name = sel.value.startsWith('custom:') ? sel.value.slice(7)
			           : sel.value ? sel.options[sel.selectedIndex].text : '';
			const filename = name ? `Palette - ${name}.json` : 'Palette.json';
			const json = JSON.stringify(captureCurrentState(), null, 2);
			const url  = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
			const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
			a.click();
			URL.revokeObjectURL(url);
		}

		// ── Event handlers ──────────────────────────────────────────────────────

		document.getElementById('preset-select').addEventListener('change', function() {
			updateDeleteButton();
			if (!this.value) return;
			if (this.value.startsWith('custom:')) {
				const p = loadCustomPresets()[this.value.slice(7)];
				if (p) applyPreset(p);
			} else if (PRESETS[this.value]) {
				applyPreset(PRESETS[this.value]);
			}
		});

		document.getElementById('btn-reset').addEventListener('click', () => {
			document.getElementById('preset-select').value = 'default';
			updateDeleteButton();
			applyPreset(PRESETS.default);
		});

		document.getElementById('btn-save-preset').addEventListener('click', () => {
			const raw = prompt('Preset name:', 'My Preset');
			if (!raw) return;
			const name = raw.trim();
			if (!name) return;
			if (PRESETS[name]) { showImportError(`"${name}" is a built-in preset name`); return; }
			const stored = saveCustomPreset(name, captureCurrentState());
			if (!stored) return;
			rebuildCustomOptgroup();
			document.getElementById('preset-select').value = 'custom:' + stored;
			updateDeleteButton();
		});

		document.getElementById('btn-delete-preset').addEventListener('click', () => {
			const sel = document.getElementById('preset-select');
			if (!sel.value.startsWith('custom:')) return;
			const name = sel.value.slice(7);
			if (!confirm(`Delete preset "${name}"?`)) return;
			deleteCustomPreset(name);
			rebuildCustomOptgroup();
			sel.value = '';
			updateDeleteButton();
		});

		document.getElementById('btn-export').addEventListener('click', exportCurrentState);

		document.getElementById('import-file').addEventListener('change', function() {
			const file = this.files[0];
			if (!file) return;
			const baseName = file.name.replace(/\.json$/i, '') || 'Imported';
			const reader = new FileReader();
			reader.onload = e => {
				let obj;
				try { obj = JSON.parse(e.target.result); }
				catch { showImportError('Invalid JSON'); this.value = ''; return; }
				const err = validatePreset(obj);
				if (err) { showImportError('Import failed: ' + err); this.value = ''; return; }
				const stored = saveCustomPreset(baseName, obj);
				if (!stored) { this.value = ''; return; }
				rebuildCustomOptgroup();
				document.getElementById('preset-select').value = 'custom:' + stored;
				updateDeleteButton();
				applyPreset(obj);
				this.value = '';
			};
			reader.readAsText(file);
		});

		document.getElementById('btn-toggle').addEventListener('click', () => {
			const html = document.documentElement;
			const prev = html.dataset.mode;
			const next = prev === 'dark' ? 'light' : 'dark';
			html.dataset.mode = next;
			document.getElementById('btn-toggle').textContent = next === 'dark' ? '\u2600 Light' : '\u263E Dark';

			const preset = getActivePreset();
			if (preset) {
				['Dim', 'Normal', 'Bright'].forEach(g => Object.assign(params[g], preset.params[next][g]));
				syncSlidersToState(preset);
			} else {
				['Dim', 'Normal', 'Bright'].forEach(g => Object.assign(paramsStore[prev][g], params[g]));
				['Dim', 'Normal', 'Bright'].forEach(g => Object.assign(params[g], paramsStore[next][g]));
				document.querySelectorAll('input[data-group]').forEach(slider => {
					const g     = slider.dataset.group;
					const p     = slider.dataset.param;
					const value = params[g][p];
					const output = slider.nextElementSibling;
					slider.value  = value;
					output.value  = value.toFixed(2);
					markOutput(output, value.toFixed(2), DEFAULTS.params[next][g][p].toFixed(2));
				});
			}

			applySwatches();
		});

		applySwatches();
		rebuildCustomOptgroup();
		updateDeleteButton();
	</script>
</body>
</html>
